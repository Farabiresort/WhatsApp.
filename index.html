<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farabi Resort | WhatsApp</title>

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;

      background:url('farabi.jpg') no-repeat center center/cover;

      position:relative;
      color:white;
    }

    /* затемнение */
    body::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      linear-gradient(
      to bottom,
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.65)
      );

      backdrop-filter:blur(8px);
    }

    /* движение фона */
    body::after{
      content:"";
      position:absolute;
      inset:-20px;

      background:url('farabi.jpg') no-repeat center center/cover;

      transform:scale(1.1);
      filter:blur(10px);

      z-index:-1;

      animation:bgMove 18s ease-in-out infinite alternate;
    }

    @keyframes bgMove{

      0%{
        transform:scale(1.1) translate(0px,0px);
      }

      100%{
        transform:scale(1.16) translate(-12px,-12px);
      }

    }

    /* стеклянная карточка */
    .card{

      position:relative;
      z-index:2;

      width:90%;
      max-width:430px;

      padding:35px 28px;

      border-radius:30px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(18px);

      box-shadow:
      0 10px 40px rgba(0,0,0,0.45),
      inset 0 0 1px rgba(255,255,255,0.3);

      animation:cardAppear 1.1s ease;
    }

    @keyframes cardAppear{

      from{
        opacity:0;
        transform:translateY(45px) scale(0.96);
      }

      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }

    }

    /* ЛОГО */
    .main-logo{

      width:100%;
      max-width:320px;

      display:block;

      margin:0 auto 28px;

      filter:
      brightness(1.1)
      drop-shadow(0 0 15px rgba(255,255,255,0.18));

      animation:logoFloat 4s ease-in-out infinite;
    }

    @keyframes logoFloat{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-5px);
      }

      100%{
        transform:translateY(0px);
      }

    }

    .subtitle{

      text-align:center;

      font-size:14px;

      opacity:0.82;

      margin-bottom:25px;

      letter-spacing:0.4px;
    }

    /* КНОПКИ */

    .btn{

      position:relative;

      overflow:hidden;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;

      width:100%;

      padding:16px;

      margin:14px 0;

      border-radius:18px;

      text-decoration:none;

      color:white;

      font-size:16px;
      font-weight:600;

      transition:0.35s ease;

      box-shadow:
      0 8px 22px rgba(0,0,0,0.28);

      animation:pulse 3s infinite;
    }

    /* shine effect */
    .btn::before{

      content:"";

      position:absolute;

      top:0;
      left:-120%;

      width:80%;
      height:100%;

      background:rgba(255,255,255,0.18);

      transform:skewX(-25deg);

      transition:0.8s;
    }

    .btn:hover::before{
      left:140%;
    }

    .btn:hover{

      transform:
      translateY(-4px)
      scale(1.02);

      box-shadow:
      0 14px 28px rgba(0,0,0,0.35);
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.015);
      }

      100%{
        transform:scale(1);
      }

    }

    .btn img{
      width:24px;
      height:24px;
    }

    .n1{
      background:linear-gradient(135deg,#25D366,#1ebe5d);
    }

    .n2{
      background:linear-gradient(135deg,#128C7E,#0e7b70);
    }

    .n3{
      background:linear-gradient(135deg,#075E54,#06463e);
    }

    footer{

      text-align:center;

      margin-top:22px;

      font-size:12px;

      opacity:0.55;

      letter-spacing:2px;
    }

    /* декоративные круги */

    .circle{

      position:absolute;

      border-radius:50%;

      background:rgba(255,255,255,0.05);

      backdrop-filter:blur(5px);

      animation:moveCircle linear infinite;
    }

    .circle:nth-child(1){

      width:140px;
      height:140px;

      top:8%;
      left:10%;

      animation-duration:18s;
    }

    .circle:nth-child(2){

      width:220px;
      height:220px;

      bottom:5%;
      right:8%;

      animation-duration:24s;
    }

    .circle:nth-child(3){

      width:90px;
      height:90px;

      bottom:24%;
      left:18%;

      animation-duration:14s;
    }

    @keyframes moveCircle{

      from{
        transform:translateY(0px) rotate(0deg);
      }

      to{
        transform:translateY(-20px) rotate(360deg);
      }

    }

    /* мобильная версия */

    @media(max-width:480px){

      .card{
        padding:30px 22px;
      }

      .main-logo{
        max-width:270px;
      }

      .btn{
        font-size:15px;
        padding:15px;
      }

    }

  </style>
</head>

<body>

  <!-- декоративные круги -->

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- КАРТОЧКА -->

  <div class="card">

    <!-- ЛОГО -->

    <img class="main-logo" src="logo.png">

    <p class="subtitle">
      Выберите WhatsApp для связи
    </p>

    <!-- КНОПКИ -->

    <a class="btn n1" href="https://wa.me/77786153444" target="_blank">

      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

      WhatsApp 1

    </a>

    <a class="btn n2" href="https://wa.me/77761252271" target="_blank">

      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

      WhatsApp 2

    </a>

    <a class="btn n3" href="https://wa.me/77777939378" target="_blank">

      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">

      WhatsApp 3

    </a>

    <footer>
      © FARABI RESORT
    </footer>

  </div>

</body>
</html>
